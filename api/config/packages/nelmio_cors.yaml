nelmio_cors:
  defaults:
    allow_credentials: true
    origin_regex: true
    allow_origin: [ '^https?://(.*\.)?folkloregarden\.cz$','localhost:3000','192.168.1.80:3000','localhost:8080','^https?://192\.168\.1\.(3|80)(:[0-9]+)?$','^https?://(.*\.)?testujeme\.online$','^https?://(.*\.)?replit\.com','^https?://(.*\.)?replit\.app','^https?://(.*\.)?replit\.dev' ]
    # CORS spec: u credentialed requestů (Phase B §1.2 — withCredentials: true)
    # `Access-Control-Allow-Headers: *` browser interpretuje doslova (jako jméno
    # hlavičky `*`), ne jako wildcard. Musíme explicitně vyjmenovat hlavičky.
    # `X-API-Key` kvůli Swagger UI partner Try-it-out.
    allow_headers: [ 'Content-Type', 'Authorization', 'X-Requested-With', 'Accept', 'X-API-Key' ]
    allow_methods: [ 'GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE' ]
    expose_headers: [ 'Authorization' ]
    max_age: 3600
  paths:
    # Mobilní API — povoleno všem origins. Bearer auth, žádné cookies →
    # `allow_credentials: false` umožňuje použít wildcard `*`. Pokrývá:
    # Expo Go (native fetch), Expo web mode (localhost:8081, LAN IP),
    # standalone build (custom URL scheme), prod app.
    # POŘADÍ MATTERS: tento entry musí být PŘED `^/` (nelmio matchuje první).
    '^/api/mobile/':
      allow_origin: [ '*' ]
      allow_credentials: false
      allow_headers: [ '*' ]
      allow_methods: [ 'GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE' ]
      expose_headers: [ 'Authorization' ]
      max_age: 3600

    '^/':
      origin_regex: true
      allow_credentials: true
      allow_origin: [ '^https?://(.*\.)?folkloregarden\.cz$','localhost:3000','localhost:8080','192.168.1.80:3000','^https?://192\.168\.1\.(3|80)(:[0-9]+)?$','^https?://(.*\.)?testujeme\.online$','^https?://(.*\.)?replit\.com','^https?://(.*\.)?replit\.app','^https?://(.*\.)?replit\.dev' ]
      # Phase B §1.2 cookie auth — explicitní seznam hlaviček, viz `defaults`.
      allow_headers: [ 'Content-Type', 'Authorization', 'X-Requested-With', 'Accept', 'X-API-Key' ]
      allow_methods: [ 'GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE' ]
      expose_headers: [ 'Authorization' ]
      max_age: 3600
